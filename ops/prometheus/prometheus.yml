global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/aimipay-alerts.yml

scrape_configs:
  - job_name: aimipay-merchant
    metrics_path: /_aimipay/ops/metrics
    static_configs:
      - targets:
          - 127.0.0.1:8000
        labels:
          service: research-copilot
          environment: target
          chain: tron
