name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-release-artifacts:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt

      - name: Install Node dependencies
        shell: powershell
        run: npm install

      - name: Run targeted test suite
        shell: powershell
        env:
          PYTHONPATH: ${{ github.workspace }}\python
        run: |
          python -m pytest python/tests/test_ops_tools.py python/tests/test_buyer.py python/tests/test_gateway.py python/tests/test_mcp.py python/tests/test_protocol_native.py -q

      - name: Build release artifacts
        shell: powershell
        env:
          PYTHONPATH: ${{ github.workspace }}\python
        run: |
          python -m ops_tools.build_release_artifacts --output-dir dist --json

      - name: Validate release artifacts
        shell: powershell
        env:
          PYTHONPATH: ${{ github.workspace }}\python
        run: |
          python -m ops_tools.validate_release_artifacts --dist-dir dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: torn-agentpay-release-artifacts
          path: dist
